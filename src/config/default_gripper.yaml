# Human-readable default gripper configuration template.
# YAML parsing is not implemented in the first config_loader version.
# Units are explicit in key names or comments.

adapter:
  type: simulated
  channel: can0
  driver_library_path: src/third_party/damiao/bin/libdm_device.dll
  device_index: 0
  channel_index: 0
  fdcan_enabled: true
  brs_enabled: true
  nominal_bitrate_bps: 1000000
  data_bitrate_bps: 5000000

motor:
  motor_id: 0x01
  host_id: 0x11
  control_mode: position_force
  direction_sign: -1
  position_command_sign: 1
  encoder_scale_ratio: 1.0
  # Damiao state q_uint is a 16-bit protocol-position code over [-P_MAX, P_MAX].
  # Use the decoded protocol position as the bounded signal for multi-turn
  # unwrapping; q_uint stays available only as a diagnostic field. On real
  # Damiao hardware P_MAX/VMAX/TMAX are read from registers at connect time and
  # override the fallback limits below.
  encoder_unwrap_source: protocol_position
  # 0 means derive wrap range from runtime 2*P_MAX. Use a positive value only
  # for an explicit offline/simulated override.
  encoder_wrap_range_rad: 0.0
  encoder_raw_count_range: 65536
  max_position_rad: 65.0
  max_velocity_rad_s: 20.0
  max_torque_nm: 28.0
  max_phase_current_a: 20.0
  torque_per_amp_nm_per_a: 0.625
  auto_switch_mode: true
  motor_frames_canfd: true
  command_id_includes_mode_offset: true
  continuous_encoder_enabled: true
  feedback_poll_period_s: 0.02
  feedback_stale_timeout_s: 0.2

mechanism:
  lead_screw_pitch_mm_per_rev: 2.0
  usable_travel_mm: 16.0
  theoretical_open_limit_mm: 0.0
  theoretical_close_limit_mm: 16.0
  zero_angle_stroke_mm: 0.0
  zero_stroke_gripper_angle_rad: 0.0
  gripper_angle_per_nut_stroke_rad_per_mm: 0.03
  gripper_angular_speed_per_nut_speed_ratio: 0.03

nut_position_encoder:
  # Multiplies motor.direction_sign for controller-side virtual nut position.
  # Set to -1 when unloaded bring-up proves the virtual nut direction is
  # reversed relative to the expected nut closing direction. This does not
  # change Damiao command polarity; use motor.position_command_sign for that.
  direction_sign: -1

self_check:
  learned_profile_path: log/pre_self_check_profile_seed.txt
  max_probe_window_mm: 1.0
  min_speed_scan_start_mm_s: 0.2
  min_speed_scan_stop_mm_s: 2.0
  min_speed_scan_step_mm_s: 0.2
  # Historical key names kept for config compatibility. These currents are
  # only the PreA bootstrap breakaway scan range, not final static friction.
  static_friction_current_start_a: 0.1
  static_friction_current_stop_a: 0.4
  static_friction_current_step_a: 0.05
  motion_start_distance_mm: 0.05
  low_confidence_motion_distance_mm: 0.02
  stable_short_stroke_distance_mm: 0.3
  dynamic_friction_speeds_mm_s: [0.6, 1.0, 1.2, 1.5]
  feedback_noise_sample_time_s: 1.0
  motion_settle_timeout_s: 5.0
  motion_settle_stable_time_s: 0.1
  motion_settle_speed_threshold_mm_s: 0.03
  motion_hold_speed_mm_s: 0.2
  motion_hold_current_a: 1.5
  travel_learning_speed_mm_s: 1.2
  # Closing-side search budget after homing. 0-16mm is only a legacy reference;
  # current hardware may need 18-20mm before the real closed end stop.
  travel_learning_search_distance_mm: 20.0
  software_limit_margin_mm: 0.5
  motion_health_check_speeds_mm_s: [1.0, 2.0, 4.0]
  min_measured_distance_mm: 0.5
  max_distance_error_mm: 0.2
  stable_speed_margin_mm_s: 0.2
  max_theoretical_travel_error_mm: 2.0
  safe_zone_margin_mm: 1.0
  pre_b_max_expansion_distance_mm: 20.0
  # PreB physical-boundary search step. Smaller steps reduce impact speed and
  # make current/velocity duration checks distinguish card points from end stops.
  pre_b_boundary_step_mm: 1.0
  pre_b_expansion_speed_mm_s: 1.0
  # If PreB stops at a physical boundary, actively back away before parameter
  # learning so samples are not taken while the screw is wedged at the end stop.
  pre_b_boundary_release_distance_mm: 1.0
  pre_b_boundary_release_speed_mm_s: 1.0
  # Release-only command current. This can be higher than normal PreB scan
  # current to unwind a wedged end stop, but remains capped by safety.max_motor_current_a.
  pre_b_boundary_release_current_limit_a: 2.0
  pre_b_soft_jam_retry_distance_mm: 1.0
  pre_b_soft_jam_retry_speed_mm_s: 1.0
  pre_b_soft_jam_progress_timeout_s: 0.6
  # PreB-only sustained-current confirmation. Feedback spikes shorter than this
  # are logged as transient peaks instead of immediately becoming structure
  # limits.
  pre_b_hard_current_confirm_time_s: 0.25
  # PreB structure-model learning must cover multiple clean, position-separated
  # regions. Candidate anchors are distributed across the low-confidence safe
  # zone so severe local friction anomalies can be skipped.
  pre_b_min_learning_regions: 3
  pre_b_learning_anchor_count: 7
  max_velocity_tracking_error_mm_s: 0.5
  max_current_ripple_a: 0.1
  max_torque_ripple_nm: 0.05
  max_motor_temperature_deg_c: 70.0
  friction_anomaly_enabled: true
  friction_anomaly_current_ratio_threshold: 2.0
  friction_anomaly_sliding_window_distance_mm: 1.0
  friction_anomaly_min_width_mm: 0.05
  friction_anomaly_min_confirmations: 2
  friction_anomaly_minor_ratio: 2.0
  friction_anomaly_moderate_ratio: 3.0
  friction_anomaly_max_records: 20
  friction_anomaly_min_baseline_current_a: 0.02
  friction_anomaly_avoid_margin_mm: 0.3
  friction_anomaly_learning_avoid_ratio: 3.0

safety:
  max_motor_current_a: 2.0
  self_check_current_limit_a: 1.9
  # PreSelfCheck-only feedback hard stop. This allows short measured current
  # peaks while probing known high-friction hardware without raising the global
  # hard current protection used by other workflows.
  self_check_feedback_hard_current_limit_a: 2.5
  # Immediate PreSelfCheck-only emergency stop. This is above the sustained
  # hard-current threshold, but stops a wedged physical end before very large
  # measured current spikes can persist.
  self_check_feedback_emergency_current_limit_a: 4.0
  homing_current_limit_a: 0.5
  travel_learning_current_limit_a: 1.5
  manual_positioning_current_limit_a: 1.5
  clamp_current_limit_a: 1.0
  max_nut_speed_mm_s: 8.0
  max_nut_acceleration_mm_s2: 40.0
  contact_current_rise_threshold_a: 0.3
  jam_current_threshold_a: 0.8
  jam_speed_threshold_mm_s: 0.1
  stroke_limit_margin_mm: 0.3
  contact_detection_time_s: 0.1
  command_timeout_s: 0.2

motor_bringup:
  # Velocity bring-up jog uses this value only for signed direction selection.
  # Actual motion is velocity * pulse duration.
  default_relative_motor_position_rad: 0.2
  max_relative_motor_position_rad: 1.0
  # Position-mode unloaded move for checking encoder/nut travel mapping.
  default_relative_motor_revolutions: 1.0
  max_relative_motor_revolutions: 2.0
  default_motor_velocity_rad_s: 0.5
  max_motor_velocity_rad_s: 5.0
  default_motor_current_a: 1.5
  max_motor_current_a: 2.0
  default_pulse_duration_s: 0.1
  max_pulse_duration_s: 2.0
  # Zero means auto-estimate from abs(rev * 2*pi) / velocity plus margin.
  default_position_move_timeout_s: 0.0
  max_position_move_timeout_s: 20.0

homing:
  direction: open
  homing_speed_mm_s: 0.8
  homing_current_a: 0.4
  jam_confirm_time_s: 0.2
  backoff_distance_mm: 0.5

clamp:
  target_force_n: 20.0
  min_target_force_n: 0.0
  max_target_force_n: 200.0
  target_nut_speed_mm_s: 1.0
  target_gripper_angular_speed_rad_s: 0.03
  approach_distance_mm: 2.0
  approach_nut_speed_mm_s: 0.5
  release_distance_mm: 1.0
  torque_per_force_nm_per_n: 0.01
  current_per_torque_a_per_nm: 1.0
  torque_offset_nm: 0.0
  current_offset_a: 0.0
  max_motor_torque_nm: 3.5

ui:
  refresh_period_s: 0.05
  log_capacity: 1000
  default_target_force_n: 20.0
  default_clamp_speed_mm_s: 1.0
